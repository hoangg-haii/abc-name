<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Speaking Tool - Gemini 2.5 Flash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .btn-interact { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-interact:active { transform: scale(0.96); }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-6xl mx-auto">
        <!-- Header & API Key Input -->
        <div class="bg-white rounded-3xl p-6 mb-6 custom-shadow border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-2xl shadow-lg text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-900 mb-0.5 tracking-tight uppercase">ABC Cambridge Tool</h1>
                    <div class="flex items-center gap-2">
                        <span class="bg-blue-100 px-2 py-0.5 rounded text-[10px] font-bold text-blue-700 uppercase">V4.2 AI</span>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-right">Gemini 2.5 Flash Integration</p>
                    </div>
                </div>
            </div>
            <!-- Ô nhập API Key trên giao diện -->
            <div class="w-full md:w-auto flex flex-col gap-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Gemini API Key</label>
                <input type="password" id="uiApiKey" placeholder="Dán API Key vào đây..." class="bg-gray-50 border border-gray-200 px-4 py-2 rounded-xl text-xs focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-64 shadow-inner">
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <!-- Cấu hình Cambridge & Family and Friends -->
            <div class="bg-white rounded-3xl p-6 custom-shadow border border-gray-100">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Cấp độ Chương trình</label>
                        <select id="camLevel" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold transition-all shadow-inner">
                            <optgroup label="Cambridge English">
                                <option value="Cambridge Starters">Starters</option>
                                <option value="Cambridge Movers" selected>Movers</option>
                                <option value="Cambridge Flyers">Flyers</option>
                                <option value="Cambridge KET">KET (A2)</option>
                                <option value="Cambridge PET">PET (B1)</option>
                            </optgroup>
                            <optgroup label="Family and Friends">
                                <option value="Family and Friends 1">F&F 1</option>
                                <option value="Family and Friends 2">F&F 2</option>
                                <option value="Family and Friends 3">F&F 3</option>
                                <option value="Family and Friends 4">F&F 4</option>
                                <option value="Family and Friends 5">F&F 5</option>
                                <option value="Family and Friends">F&F</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Trung tâm</label>
                        <input type="text" id="tplCenter" value="ABC 1" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold transition-all shadow-inner">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Ngày thi</label>
                        <input type="text" id="tplDate" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold transition-all shadow-inner" placeholder="Mặc định: Hôm nay">
                    </div>
                </div>
            </div>

            <!-- Nhập dữ liệu và AI Scan -->
            <div class="bg-white rounded-3xl p-6 custom-shadow border border-gray-100">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="relative h-64 group">
                        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleAIImage(event)">
                        <label for="imageInput" class="flex flex-col items-center justify-center w-full h-full border-2 border-dashed border-gray-200 rounded-3xl cursor-pointer bg-gray-50 hover:bg-white hover:border-blue-400 transition-all">
                            <div class="bg-blue-50 p-4 rounded-2xl mb-3 group-hover:rotate-6 transition-transform">
                                <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.587-1.587a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            </div>
                            <span class="text-sm font-bold text-slate-700 uppercase tracking-tight">Dán (Ctrl+V) hoặc Tải danh sách</span>
                            <span class="text-[10px] text-slate-400 mt-2 uppercase font-black tracking-tighter italic">AI Gemini sẽ tự phân tích Tên, Anh, Lớp</span>
                        </label>
                        <!-- Loading Overlay -->
                        <div id="aiLoading" class="hidden absolute inset-0 bg-white/95 rounded-3xl flex flex-col items-center justify-center z-10 border border-blue-100 shadow-xl">
                            <div class="loader mb-4"></div>
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest animate-pulse">Gemini đang phân tích dữ liệu...</span>
                        </div>
                    </div>

                    <div class="flex flex-col h-full">
                        <label class="block text-[10px] font-black text-slate-400 uppercase ml-1 mb-2 tracking-widest">Văn bản trích xuất (Check & Sửa tại đây)</label>
                        <textarea id="inputData" class="flex-1 w-full p-4 bg-gray-50 border border-gray-200 rounded-3xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium shadow-inner" placeholder="Dữ liệu mẫu sau khi quét: &#10;Nguyễn Văn An, Andy, MGL1&#10;Trần Thị Bình, Bella, MGN2"></textarea>
                    </div>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3">
                    <button onclick="processList()" class="btn-interact flex-1 bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl transition-all shadow-xl flex items-center justify-center gap-3 uppercase text-xs tracking-widest">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002-2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        Xác nhận và Xuất kết quả
                    </button>
                    <button onclick="clearData()" class="btn-interact px-8 bg-gray-100 hover:bg-gray-200 text-slate-500 font-bold py-5 rounded-2xl transition-all uppercase text-xs tracking-widest">
                        Xóa dữ liệu
                    </button>
                </div>
            </div>

            <!-- Kết quả hiển thị -->
            <div id="resultSection" class="hidden space-y-6 pb-20 animate-in fade-in duration-500">
                <div class="table-container bg-white rounded-3xl custom-shadow border border-gray-100 overflow-hidden">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="p-5 font-black text-slate-400 w-[15%] text-center uppercase text-[9px] tracking-widest">Tên Anh</th>
                                <th class="p-5 font-black text-slate-400 w-[30%] text-center uppercase text-[9px] tracking-widest">Tiêu đề (Title)</th>
                                <th class="p-5 font-black text-slate-400 w-[55%] text-center uppercase text-[9px] tracking-widest">Mô tả (Bio)</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest opacity-0 translate-y-10 transition-all pointer-events-none shadow-2xl z-50">
        Copy thành công!
    </div>

    <script>
        const apiKey = ""; // API Key dự phòng môi trường

        // Paste ảnh từ clipboard
        window.addEventListener('paste', async (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    await runGeminiOCR(blob);
                }
            }
        });

        async function handleAIImage(event) {
            const file = event.target.files[0];
            if (file) await runGeminiOCR(file);
        }

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function runGeminiOCR(file) {
            const loading = document.getElementById('aiLoading');
            const inputData = document.getElementById('inputData');
            
            let currentKey = document.getElementById('uiApiKey').value.trim();
            if (!currentKey) {
                currentKey = (typeof apiKey !== 'undefined' && apiKey !== "") ? apiKey : "";
            }

            if (!currentKey) {
                alert("Vui lòng dán API Key vào ô nhập phía trên cùng trước khi quét ảnh!");
                return;
            }

            loading.classList.remove('hidden');

            try {
                const base64Data = await fileToBase64(file);
                const prompt = "Hãy trích xuất danh sách học sinh từ ảnh này. Trả về văn bản thô, mỗi học sinh một dòng theo định dạng: Họ và tên, Tên tiếng Anh, Lớp. Không thêm bất kỳ văn bản giải thích nào khác.";
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/png", data: base64Data } }
                            ]
                        }]
                    })
                });

                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error.message);
                }

                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                inputData.value = text.trim();
            } catch (error) {
                console.error("Gemini Error:", error);
                alert("Lỗi: " + error.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function processList() {
            const input = document.getElementById('inputData').value;
            const camLevel = document.getElementById('camLevel').value;
            const center = document.getElementById('tplCenter').value;
            const date = document.getElementById('tplDate').value || new Date().toLocaleDateString('vi-VN');
            const tbody = document.getElementById('resultBody');
            
            tbody.innerHTML = '';
            const lines = input.split('\n');
            let hasData = false;

            lines.forEach(line => {
                if (!line.trim()) return;
                const parts = line.split(/[,;|/\t]+/).map(p => p.trim());
                if (parts.length < 2) return;

                const hoTen = parts[0];
                const tenAnh = parts[1];
                const lop = parts[2] || "Lớp";
                
                // Cấu trúc tiêu đề yêu cầu
                const title = `${camLevel} Speaking Test - ${center} - ${hoTen} ${tenAnh}`;
                
                const bio = `${hoTen} - ${tenAnh} - ${lop} - Test ${date}\n\nContact for work: Anh ngữ ABC Hội An\nEmail: abcenglishcenter@gmail.com\nHotline: 0393 62 1362\nFacebook: Anh Ngữ ABC Hội An\nAddress: 1362 Trần Thủ Độ, Điện Bàn Đông, Quảng Nam`;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/50 transition-all group";
                tr.innerHTML = `
                    <td class="p-6 text-center">
                        <span class="inline-block bg-white border border-blue-100 text-blue-600 font-black px-4 py-2 rounded-xl text-xs shadow-sm">${tenAnh}</span>
                    </td>
                    <td class="p-6">
                        <div class="bg-white border border-gray-100 p-4 rounded-2xl font-bold text-slate-700 text-center text-[11px] mb-3 shadow-sm group-hover:border-blue-200 transition-colors">${title}</div>
                        <button onclick="copyText(this, \`${title}\`)" class="btn-interact w-full bg-slate-900 text-white text-[9px] font-black py-3 rounded-xl hover:bg-blue-600 uppercase tracking-widest shadow-lg">Copy Title</button>
                    </td>
                    <td class="p-6">
                        <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl whitespace-pre-wrap text-slate-500 text-[10px] mb-3 group-hover:bg-white transition-colors leading-relaxed">${bio}</div>
                        <button onclick="copyText(this, \`${bio}\`)" class="btn-interact w-full bg-white text-slate-400 border border-gray-200 text-[9px] font-black py-3 rounded-xl hover:bg-slate-50 uppercase tracking-widest">Copy Bio</button>
                    </td>
                `;
                tbody.appendChild(tr);
                hasData = true;
            });

            if (hasData) {
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function copyText(btn, text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-10'); }, 1500);
            
            const originalText = btn.innerText;
            btn.innerText = 'ĐÃ COPY!';
            setTimeout(() => { btn.innerText = originalText; }, 800);
        }

        function clearData() {
            if(confirm("Xóa toàn bộ dữ liệu hiện tại?")) {
                document.getElementById('inputData').value = '';
                document.getElementById('resultSection').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
